<script>
// Demon King Throne Room v2.0 — rebuilt from staged plan

THREE.OrbitControls = function(camera, domElement) {
    this.camera = camera; this.domElement = domElement; this.target = new THREE.Vector3();
    this.enableDamping = true; this.dampingFactor = 0.08; this.rotateSpeed = 0.8; this.zoomSpeed = 1.1; this.panSpeed = 0.5;
    const scope = this; const STATE = { NONE:-1, ROTATE:0, PAN:1 }; let state = STATE.NONE;
    const spherical = new THREE.Spherical(); const sphericalDelta = new THREE.Spherical(); const panOffset = new THREE.Vector3(); let scale = 1;
    const rotateStart = new THREE.Vector2(), rotateEnd = new THREE.Vector2(), panStart = new THREE.Vector2(), panEnd = new THREE.Vector2();
    function panLeft(distance, objectMatrix) { const v = new THREE.Vector3(); v.setFromMatrixColumn(objectMatrix, 0); v.multiplyScalar(-distance); panOffset.add(v); }
    function panUp(distance, objectMatrix) { const v = new THREE.Vector3(); v.setFromMatrixColumn(objectMatrix, 1); v.multiplyScalar(distance); panOffset.add(v); }
    function pan(deltaX, deltaY) { const offset = new THREE.Vector3().copy(scope.camera.position).sub(scope.target); let targetDistance = offset.length(); targetDistance *= Math.tan((scope.camera.fov / 2) * Math.PI / 180.0); panLeft(2 * deltaX * targetDistance / scope.domElement.clientHeight, scope.camera.matrix); panUp(2 * deltaY * targetDistance / scope.domElement.clientHeight, scope.camera.matrix); }
    this.update = function() {
        const offset = new THREE.Vector3().copy(scope.camera.position).sub(scope.target);
        spherical.setFromVector3(offset); spherical.theta += sphericalDelta.theta; spherical.phi += sphericalDelta.phi; spherical.radius *= scale;
        spherical.phi = Math.max(0.15, Math.min(Math.PI - 0.15, spherical.phi)); spherical.radius = Math.max(8, Math.min(120, spherical.radius));
        offset.setFromSpherical(spherical); scope.target.add(panOffset); scope.camera.position.copy(scope.target).add(offset); scope.camera.lookAt(scope.target);
        sphericalDelta.theta *= (1 - scope.dampingFactor); sphericalDelta.phi *= (1 - scope.dampingFactor); panOffset.multiplyScalar(1 - scope.dampingFactor); scale += (1 - scale) * scope.dampingFactor;
    };
    function onDown(e) { if (e.button === 0) { state = STATE.ROTATE; rotateStart.set(e.clientX, e.clientY); } else if (e.button === 2) { state = STATE.PAN; panStart.set(e.clientX, e.clientY); } }
    function onMove(e) { if (state === STATE.ROTATE) { rotateEnd.set(e.clientX, e.clientY); const dx = rotateEnd.x - rotateStart.x, dy = rotateEnd.y - rotateStart.y; sphericalDelta.theta -= 2 * Math.PI * dx / scope.domElement.clientWidth * scope.rotateSpeed; sphericalDelta.phi -= 2 * Math.PI * dy / scope.domElement.clientHeight * scope.rotateSpeed; rotateStart.copy(rotateEnd); } else if (state === STATE.PAN) { panEnd.set(e.clientX, e.clientY); pan(panEnd.x - panStart.x, panEnd.y - panStart.y); panStart.copy(panEnd); } }
    function onUp() { state = STATE.NONE; } function onWheel(e) { e.preventDefault(); scale *= e.deltaY > 0 ? 1.08 : 0.92; }
    domElement.addEventListener('pointerdown', onDown); domElement.addEventListener('pointermove', onMove); domElement.addEventListener('pointerup', onUp); domElement.addEventListener('wheel', onWheel, { passive: false }); domElement.addEventListener('contextmenu', e => e.preventDefault());
};

const PARAMS = {
  unit: 'meters',
  hallWidth: 32, hallLength: 68, wallHeight: 19, vaultHeight: 25,
  aisleWidth: 8, floorInset: 2.8,
  pillarRadius: 1.6, pillarHeight: 18, pillarTwist: 0.32,
  daisWidth: 13, daisDepth: 9, daisHeight: 2.4, stepDepth: 1.35, stepCount: 3,
  throneWidth: 4.6, throneDepth: 3.0, throneSeatHeight: 1.3, throneHeight: 9.5,
  windowRadius: 7.2, statueHeight: 10.5,
  emberCount: 420, smokeCount: 18
};

const PILLAR_POSITIONS = [{"x": -11.0, "y": 0.0, "z": -23.0}, {"x": -11.0, "y": 0.0, "z": -13.8}, {"x": -11.0, "y": 0.0, "z": -4.6}, {"x": -11.0, "y": 0.0, "z": 4.6}, {"x": -11.0, "y": 0.0, "z": 13.8}, {"x": -11.0, "y": 0.0, "z": 23.0}, {"x": 11.0, "y": 0.0, "z": -23.0}, {"x": 11.0, "y": 0.0, "z": -13.8}, {"x": 11.0, "y": 0.0, "z": -4.6}, {"x": 11.0, "y": 0.0, "z": 4.6}, {"x": 11.0, "y": 0.0, "z": 13.8}, {"x": 11.0, "y": 0.0, "z": 23.0}];
const VAULT_ARC = [[15.0, 0.0], [14.623919, 3.337814], [13.514533, 6.508256], [11.727472, 9.352347], [9.352347, 11.727472], [6.508256, 13.514533], [3.337814, 14.623919], [0.0, 15.0], [-3.337814, 14.623919], [-6.508256, 13.514533], [-9.352347, 11.727472], [-11.727472, 9.352347], [-13.514533, 6.508256], [-14.623919, 3.337814], [-15.0, 0.0]];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050506);
scene.fog = new THREE.FogExp2(0x0b0909, 0.022);

const camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 0.1, 250);
camera.position.set(0, 7.5, 33);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 7, -17);

const MATS = {
  basalt: new THREE.MeshStandardMaterial({ color: 0x18161a, roughness: 0.95, metalness: 0.03 }),
  basalt2: new THREE.MeshStandardMaterial({ color: 0x221d22, roughness: 0.9, metalness: 0.04 }),
  obsidian: new THREE.MeshStandardMaterial({ color: 0x0d0b10, roughness: 0.22, metalness: 0.1 }),
  iron: new THREE.MeshStandardMaterial({ color: 0x2d2a30, roughness: 0.52, metalness: 0.85 }),
  brass: new THREE.MeshStandardMaterial({ color: 0x8a6030, roughness: 0.36, metalness: 0.92 }),
  velvet: new THREE.MeshStandardMaterial({ color: 0x52121a, roughness: 0.82, metalness: 0.05 }),
  ember: new THREE.MeshStandardMaterial({ color: 0xff8b26, emissive: 0xff4a12, emissiveIntensity: 1.25, roughness: 0.4 }),
  lava: new THREE.MeshStandardMaterial({ color: 0x2b0902, emissive: 0xff5a14, emissiveIntensity: 1.7, roughness: 0.65 }),
  ash: new THREE.MeshStandardMaterial({ color: 0x4d4548, roughness: 1.0 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x451012, emissive: 0x8b1b15, emissiveIntensity: 1.05, transparent: true, opacity: 0.72, roughness: 0.18, metalness: 0.05 }),
  sigil: new THREE.MeshBasicMaterial({ color: 0xa02218, transparent: true, opacity: 0.72 })
};

function setShadow(obj) { obj.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } }); return obj; }
function rand(a,b) { return a + Math.random() * (b-a); }

function buildHallShell(root) {
  const floor = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.hallWidth, 0.9, PARAMS.hallLength), MATS.basalt);
  floor.position.y = -0.45; floor.name = 'floor_slab'; root.add(floor);

  const leftWall = new THREE.Mesh(new THREE.BoxGeometry(1.4, PARAMS.wallHeight, PARAMS.hallLength), MATS.basalt2);
  leftWall.position.set(-PARAMS.hallWidth/2 + 0.7, PARAMS.wallHeight/2, 0);
  const rightWall = leftWall.clone(); rightWall.position.x *= -1;
  const backWall = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.hallWidth, PARAMS.wallHeight+4, 1.6), MATS.basalt2);
  backWall.position.set(0, (PARAMS.wallHeight+4)/2, -PARAMS.hallLength/2 + 0.8);
  root.add(leftWall, rightWall, backWall);

  const ceiling = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.hallWidth-1.2, 1.2, PARAMS.hallLength), MATS.obsidian);
  ceiling.position.set(0, PARAMS.vaultHeight, 0); root.add(ceiling);

  const rearNiche = new THREE.Mesh(new THREE.CylinderGeometry(PARAMS.windowRadius*0.92, PARAMS.windowRadius*0.92, 2.2, 24, 1, true, Math.PI, Math.PI), MATS.obsidian);
  rearNiche.rotation.y = Math.PI/2; rearNiche.position.set(0, 12.5, -PARAMS.hallLength/2 + 1.8); root.add(rearNiche);
}

function buildFloorTiles(root) {
  const group = new THREE.Group(); group.name = 'floor_tiles';
  const tileGeo = new THREE.BoxGeometry(3.6, 0.12, 3.6);
  for (let x=-4; x<=4; x++) {
    for (let z=-8; z<=8; z++) {
      const tile = new THREE.Mesh(tileGeo, (x+z)%2===0 ? MATS.basalt2 : MATS.basalt);
      const px = x*3.45 + (z%2)*0.16;
      const pz = z*3.78;
      tile.position.set(px, -0.02, pz);
      tile.rotation.y = (x*0.05 + z*0.03) * 0.2;
      tile.scale.set(1 + Math.sin(x*2.1+z)*0.03, 1, 1 + Math.cos(z*1.4-x)*0.03);
      if (Math.abs(px) < PARAMS.aisleWidth*0.62) tile.position.y -= 0.03;
      group.add(tile);
    }
  }
  for (let i=0;i<12;i++) {
    const crack = new THREE.Mesh(new THREE.BoxGeometry(rand(0.8, 2.8), 0.04, rand(0.12, 0.22)), MATS.ash);
    crack.position.set(rand(-PARAMS.hallWidth*0.38, PARAMS.hallWidth*0.38), 0.05, rand(-24, 18));
    crack.rotation.y = rand(0, Math.PI); group.add(crack);
  }
  root.add(group);
}

function buildFissures(root) {
  const group = new THREE.Group(); group.name = 'lava_fissures';
  const fissurePaths = [
    [[-7,0,8],[-4,0,3],[-2,0,-2],[0,0,-8]],
    [[7,0,10],[4.5,0,5],[2.5,0,-1],[2,0,-7]],
    [[-3.5,0,-18],[-1.5,0,-22],[1.2,0,-26],[4.5,0,-30]],
  ];
  fissurePaths.forEach((pts, idx) => {
    for (let i=0;i<pts.length-1;i++) {
      const a = new THREE.Vector3(...pts[i]); const b = new THREE.Vector3(...pts[i+1]);
      const len = a.distanceTo(b); const mid = a.clone().add(b).multiplyScalar(0.5);
      const lava = new THREE.Mesh(new THREE.BoxGeometry(0.65 + idx*0.14, 0.03, len), MATS.lava);
      lava.position.copy(mid); lava.position.y = 0.03;
      lava.lookAt(b); lava.rotateY(Math.PI);
      group.add(lava);
    }
  });
  root.add(group);
}

function buildRitualCircle(root) {
  const group = new THREE.Group(); group.position.set(0, 0.05, -16); group.name = 'ritual_circle';
  const outer = new THREE.Mesh(new THREE.RingGeometry(3.7, 4.2, 72), MATS.sigil); outer.rotation.x = -Math.PI/2;
  const inner = new THREE.Mesh(new THREE.RingGeometry(1.65, 1.9, 54), MATS.sigil); inner.rotation.x = -Math.PI/2;
  group.add(outer, inner);
  for (let i=0;i<8;i++) {
    const rune = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.02, 0.9), MATS.sigil);
    const a = i/8*Math.PI*2; rune.position.set(Math.cos(a)*2.75, 0.01, Math.sin(a)*2.75); rune.rotation.y = -a; group.add(rune);
  }
  for (let i=0;i<6;i++) {
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.02, 3.1), MATS.sigil);
    const a = i/6*Math.PI*2; spoke.rotation.y = a; group.add(spoke);
  }
  root.add(group);
}

function buildPillar(position) {
  const group = new THREE.Group(); group.position.set(position.x, 0, position.z); group.name = 'twisted_pillar';
  const segGeo = new THREE.CylinderGeometry(PARAMS.pillarRadius*1.1, PARAMS.pillarRadius*0.95, 3.2, 9);
  for (let i=0;i<5;i++) {
    const seg = new THREE.Mesh(segGeo, i%2===0 ? MATS.basalt2 : MATS.basalt);
    seg.position.y = 1.6 + i*3.2;
    seg.rotation.y = i * PARAMS.pillarTwist;
    seg.scale.set(1 + Math.sin(i)*0.08, 1, 1 + Math.cos(i*0.7)*0.08);
    group.add(seg);
  }
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(PARAMS.pillarRadius*1.35, PARAMS.pillarRadius*1.22, 1.3, 10), MATS.obsidian);
  cap.position.y = PARAMS.pillarHeight + 0.4;
  const base = new THREE.Mesh(new THREE.CylinderGeometry(PARAMS.pillarRadius*1.45, PARAMS.pillarRadius*1.22, 1.1, 10), MATS.obsidian);
  base.position.y = 0.55;
  group.add(cap, base);
  for (let i=0;i<3;i++) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(PARAMS.pillarRadius*1.1 + i*0.08, 0.08, 10, 28), MATS.brass);
    ring.rotation.x = Math.PI/2; ring.position.y = 5.5 + i*5.2; group.add(ring);
  }
  return setShadow(group);
}

function buildVaultRibs(root) {
  const ribMat = MATS.iron;
  const zPositions = [-24,-15,-6,3,12,21];
  zPositions.forEach((z, idx) => {
    const rib = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(VAULT_ARC.map(([x,y]) => new THREE.Vector3(x*0.9, y+4.5, z))), 48, 0.18, 12, false), ribMat);
    root.add(rib);
    const brace = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.hallWidth-5, 0.18, 0.18), MATS.brass);
    brace.position.set(0, 12.5 + idx*0.55, z); root.add(brace);
  });

  const sideArches = new THREE.Group();
  for (let i=0;i<5;i++) {
    const z = -20 + i*10;
    const arch = new THREE.Mesh(new THREE.TorusGeometry(5.6, 0.2, 10, 32, Math.PI), MATS.iron);
    arch.rotation.z = Math.PI; arch.position.set(-10.9, 12.6, z); sideArches.add(arch);
    const arch2 = arch.clone(); arch2.position.x *= -1; sideArches.add(arch2);
  }
  root.add(sideArches);
}

function buildWallDetail(root) {
  const group = new THREE.Group(); group.name = 'wall_detail';
  for (let side of [-1,1]) {
    for (let i=0;i<5;i++) {
      const z = -21 + i*10.5;
      const niche = new THREE.Mesh(new THREE.BoxGeometry(2.6, 6.2, 0.45), MATS.obsidian);
      niche.position.set(side*(PARAMS.hallWidth/2 - 0.9), 7.5, z);
      group.add(niche);
      const sigil = new THREE.Mesh(new THREE.RingGeometry(0.85, 1.05, 24, 1, 0, Math.PI*1.5), MATS.sigil);
      sigil.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2; sigil.position.set(side*(PARAMS.hallWidth/2 - 1.45), 8.3, z); group.add(sigil);
      for (let j=0;j<3;j++) {
        const skull = new THREE.Mesh(new THREE.SphereGeometry(0.24, 10, 10), MATS.ash);
        skull.position.set(side*(PARAMS.hallWidth/2 - 1.1), 5.5 + j*0.7, z + (j-1)*0.55); group.add(skull);
      }
    }
  }
  root.add(group);
}

function buildDais(root) {
  const group = new THREE.Group(); group.position.z = -PARAMS.hallLength/2 + 10.5; group.name = 'dais';
  for (let i=0;i<PARAMS.stepCount;i++) {
    const w = PARAMS.daisWidth + i*3.1; const d = PARAMS.daisDepth + i*2.0;
    const step = new THREE.Mesh(new THREE.BoxGeometry(w, 0.8, d), i===PARAMS.stepCount-1 ? MATS.obsidian : MATS.basalt2);
    step.position.set(0, i*0.8, i*1.25); group.add(step);
  }
  const fissure = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.daisWidth-1.5, 0.06, 0.42), MATS.lava);
  fissure.position.set(0, 0.85, PARAMS.daisDepth*0.15); group.add(fissure);

  const relicGeo = new THREE.BoxGeometry(0.18, 0.18, 2.4);
  for (let i=0;i<8;i++) {
    const relic = new THREE.Mesh(relicGeo, i%2===0 ? MATS.iron : MATS.brass);
    relic.position.set(-6 + i*1.7, 0.55, 6.6 + (i%2)*0.8); relic.rotation.x = -1.2; relic.rotation.z = rand(-0.4,0.4); group.add(relic);
  }
  root.add(group);
}

function buildThrone(root) {
  const group = new THREE.Group(); group.position.set(0, 2.45, -PARAMS.hallLength/2 + 10.8); group.name = 'throne';
  const base = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.throneWidth, 1.2, PARAMS.throneDepth), MATS.obsidian);
  base.position.y = 0.6; group.add(base);
  const seat = new THREE.Mesh(new THREE.BoxGeometry(PARAMS.throneWidth-0.8, 0.55, PARAMS.throneDepth-0.85), MATS.velvet);
  seat.position.set(0, 1.25, 0.12); group.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(2.15, PARAMS.throneHeight, 0.9), MATS.obsidian);
  back.position.set(0, PARAMS.throneHeight/2 + 1.0, -0.88); group.add(back);
  const wingGeo = new THREE.BoxGeometry(0.6, 7.4, 0.6);
  for (let s of [-1,1]) {
    const wingA = new THREE.Mesh(wingGeo, MATS.iron); wingA.position.set(s*1.8, 6.5, -0.6); wingA.rotation.z = -s*0.55; group.add(wingA);
    const wingB = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5.8, 0.5), MATS.iron); wingB.position.set(s*2.55, 5.6, -0.45); wingB.rotation.z = -s*0.98; group.add(wingB);
    const horn = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.34, 3.7, 9), MATS.obsidian); horn.position.set(s*1.55, 9.9, -0.6); horn.rotation.z = -s*0.55; group.add(horn);
  }
  for (let s of [-1,1]) {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.2, 2.35), MATS.iron); arm.position.set(s*2.05, 1.8, 0.05); group.add(arm);
    const skull = new THREE.Mesh(new THREE.SphereGeometry(0.58, 12, 12), MATS.basalt2); skull.position.set(s*2.05, 1.85, 1.1); group.add(skull);
    const snout = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.28, 0.8), MATS.obsidian); snout.position.set(s*2.05, 1.7, 1.55); group.add(snout);
    const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), MATS.ember); eye1.position.set(s*1.86, 1.95, 1.4); group.add(eye1);
    const eye2 = eye1.clone(); eye2.position.x = s*2.24; group.add(eye2);
  }
  for (let i=0;i<5;i++) {
    const crack = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 1.1), MATS.lava);
    crack.position.set(-1.5 + i*0.75, 0.03, 0.95 - (i%2)*0.5); crack.rotation.y = rand(-0.4,0.4); group.add(crack);
  }
  root.add(setShadow(group));
}

function buildWindow(root) {
  const group = new THREE.Group(); group.position.set(0, 13, -PARAMS.hallLength/2 + 1.02); group.name = 'rear_window';
  const disc = new THREE.Mesh(new THREE.CircleGeometry(PARAMS.windowRadius, 48), MATS.glass); group.add(disc);
  const ring = new THREE.Mesh(new THREE.RingGeometry(PARAMS.windowRadius*0.88, PARAMS.windowRadius, 48), MATS.iron); group.add(ring);
  const inner = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.55, 32), MATS.iron); group.add(inner);
  for (let i=0;i<10;i++) {
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.22, PARAMS.windowRadius*1.65, 0.24), MATS.iron);
    spoke.rotation.z = i/10*Math.PI*2; group.add(spoke);
  }
  for (let i=0;i<7;i++) {
    const crack = new THREE.Mesh(new THREE.BoxGeometry(0.12, rand(2, 4.5), 0.15), MATS.ash);
    crack.position.set(rand(-3.8, 3.8), rand(-3.8, 3.8), 0.05); crack.rotation.z = rand(0, Math.PI); group.add(crack);
  }
  const glow = new THREE.PointLight(0xaa1f14, 2.1, 42, 2); glow.position.set(0, 0, 3.8); group.add(glow);
  root.add(group);
}

function buildBrazier(x,z,scale=1) {
  const group = new THREE.Group(); group.position.set(x, 0, z); group.name = 'brazier';
  const bowl = new THREE.Mesh(new THREE.CylinderGeometry(0.55*scale, 0.8*scale, 0.55*scale, 7), MATS.brass); bowl.position.y = 1.1*scale;
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.16*scale, 0.2*scale, 1.1*scale, 8), MATS.iron); stem.position.y = 0.52*scale;
  const flame = new THREE.Mesh(new THREE.ConeGeometry(0.36*scale, 1.2*scale, 7), MATS.ember); flame.position.y = 1.7*scale;
  const light = new THREE.PointLight(0xff7a22, 1.6*scale, 15*scale, 2); light.position.y = 1.55*scale;
  group.add(stem, bowl, flame, light); return setShadow(group);
}

function buildStatue(side) {
  const group = new THREE.Group(); group.position.set(side*7.8, 0.2, -PARAMS.hallLength/2 + 12.2); group.name = 'demon_statue';
  const plinth = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.5, 2.6), MATS.obsidian); plinth.position.y = 0.75; group.add(plinth);
  const torso = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4.4, 1.25), MATS.basalt2); torso.position.y = 4.1; group.add(torso);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.82, 12, 12), MATS.basalt); head.position.set(0, 6.8, 0.05); group.add(head);
  const horn1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.22, 1.7, 8), MATS.obsidian); horn1.position.set(-0.38, 7.55, -0.1); horn1.rotation.z = -0.5; group.add(horn1);
  const horn2 = horn1.clone(); horn2.position.x *= -1; horn2.rotation.z *= -1; group.add(horn2);
  const wingA = new THREE.Mesh(new THREE.BoxGeometry(0.48, 5.8, 0.32), MATS.iron); wingA.position.set(side*1.25, 4.7, -0.32); wingA.rotation.z = -side*1.0; group.add(wingA);
  const wingB = new THREE.Mesh(new THREE.BoxGeometry(0.42, 5.0, 0.28), MATS.iron); wingB.position.set(side*1.8, 4.5, -0.5); wingB.rotation.z = -side*1.25; group.add(wingB);
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.42, 3.6, 0.42), MATS.basalt2); arm.position.set(side*0.75, 4.4, 0.25); arm.rotation.z = -side*0.25; group.add(arm);
  const sword = new THREE.Mesh(new THREE.BoxGeometry(0.12, 3.8, 0.28), MATS.iron); sword.position.set(side*1.0, 2.95, 0.95); sword.rotation.z = side*0.2; group.add(sword);
  return setShadow(group);
}

function buildChainsAndBanners(root) {
  const group = new THREE.Group(); group.name = 'chains_banners';
  for (let side of [-1,1]) {
    for (let i=0;i<4;i++) {
      const z = -25 + i*14;
      const chain = new THREE.Mesh(new THREE.TorusGeometry(3.8 + i*0.15, 0.1, 8, 36, Math.PI*0.85), MATS.iron);
      chain.rotation.z = side < 0 ? 0.6 : -0.6; chain.position.set(side*(7.5 + i*0.45), 18.5 - i*0.7, z); group.add(chain);
      const banner = new THREE.Mesh(new THREE.BoxGeometry(1.3, 6.0, 0.05), MATS.velvet);
      banner.position.set(side*(13.5), 12.8, z+2.5); group.add(banner);
      const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.8, 8), MATS.brass);
      rod.rotation.z = Math.PI/2; rod.position.set(side*(13.5), 15.7, z+2.5); group.add(rod);
    }
  }
  root.add(group);
}

function addSmoke(root) {
  const smokeMat = new THREE.MeshStandardMaterial({ color: 0x262226, transparent: true, opacity: 0.16, roughness: 1.0 });
  const group = new THREE.Group(); group.name = 'smoke';
  for (let i=0;i<PARAMS.smokeCount;i++) {
    const puff = new THREE.Mesh(new THREE.SphereGeometry(rand(1.2,3.6), 12, 12), smokeMat);
    puff.position.set(rand(-9,9), rand(0.3,2.2), rand(-28,20)); puff.scale.y = rand(0.22,0.5); group.add(puff);
  }
  root.add(group);
}

function addEmbers(root) {
  const pos = []; const sizes = [];
  for (let i=0;i<PARAMS.emberCount;i++) {
    pos.push(rand(-16,16), rand(0.4, 20), rand(-34, 26)); sizes.push(rand(0.5,1.7));
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
  const m = new THREE.PointsMaterial({ color: 0xffa43a, size: 0.12, transparent: true, opacity: 0.9, sizeAttenuation: true });
  const p = new THREE.Points(g, m); p.name = 'embers'; root.add(p); return p;
}

function addLighting(root) {
  scene.add(new THREE.AmbientLight(0x2c1c19, 0.55));
  const moon = new THREE.DirectionalLight(0x7d88aa, 0.95); moon.position.set(0, 22, -32); moon.castShadow = true; moon.shadow.mapSize.width = 2048; moon.shadow.mapSize.height = 2048; scene.add(moon);
  const redFill = new THREE.PointLight(0xaa1a10, 1.4, 80, 2); redFill.position.set(0, 6, -22); scene.add(redFill);
  root.add(buildBrazier(-7.2, -23.5, 1.2), buildBrazier(7.2, -23.5, 1.2), buildBrazier(-10.8, -8.0, 1.0), buildBrazier(10.8, -8.0, 1.0));
}

function buildModel() {
  const root = new THREE.Group(); root.name = 'demon_king_throne_room';
  buildHallShell(root);
  buildFloorTiles(root);
  buildFissures(root);
  buildRitualCircle(root);
  PILLAR_POSITIONS.forEach(p => root.add(buildPillar(p)));
  buildVaultRibs(root);
  buildWallDetail(root);
  buildDais(root);
  buildThrone(root);
  buildWindow(root);
  root.add(buildStatue(-1), buildStatue(1));
  buildChainsAndBanners(root);
  addSmoke(root);
  const embers = addEmbers(root);
  addLighting(root);
  scene.add(root);
  return { root, embers };
}

const built = buildModel();

function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.001;
  if (built.embers) {
    built.embers.rotation.y = t * 0.02;
    const arr = built.embers.geometry.attributes.position.array;
    for (let i=1;i<arr.length;i+=3) arr[i] += Math.sin(t + i*0.03) * 0.003;
    built.embers.geometry.attributes.position.needsUpdate = true;
  }
  scene.traverse(obj => {
    if (obj.isPointLight && obj.parent && obj.parent.name === 'brazier') obj.intensity = 1.2 + Math.sin(t*7 + obj.position.y)*0.25;
    if (obj.isMesh && obj.material === MATS.ember && obj.geometry.type === 'ConeGeometry') obj.scale.y = 1 + Math.sin(t*8 + obj.position.x)*0.12;
  });
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
